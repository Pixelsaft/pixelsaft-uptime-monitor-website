name: check-uptime-and-update-db

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: uptime-monitor
  cancel-in-progress: false

jobs:
  check-uptime-and-update-db:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Update uptime data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            npm run checkAndUpdateDb
            git add docs/status.json history.json
            if git diff --staged --quiet; then
              echo "No changes to commit"
              exit 0
            fi
            git commit -m "chore(status): update uptime data - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            if git push; then
              exit 0
            fi
            git reset --hard HEAD~1
            sleep 5
          done
          echo "Failed to push uptime data after retries"
          exit 1

